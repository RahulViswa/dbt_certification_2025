name: Lint and Auto-Fix dbt Project

on:
  push:
    branches-ignore:
      - 'main'

permissions:
  contents: write

jobs:
  lint_and_fix_project:
    name: Run SQLFluff Linter and Auto-Fix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Required for committing back changes

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install SQLFluff
        run: |
          python -m pip install --upgrade pip
          pip install sqlfluff

      - name: Auto-fix SQLFluff issues
        continue-on-error: true     # ✅ Prevents skipping next steps
        run: |
          echo "🧹 Running SQLFluff Auto-Fix..."
          sqlfluff fix models --dialect snowflake || true

      - name: Run SQLFluff lint and show unfixable violations
        id: lint
        continue-on-error: true     # ✅ Even if lint finds issues, go on
        run: |
          echo "🔍 Running SQLFluff Lint..."
          sqlfluff lint models --dialect snowflake --format human > lint_output.txt || true

          echo ""
          echo "=============================="
          echo "✅ SQLFluff Lint Summary"
          echo "=============================="
          grep -E "^== " lint_output.txt | sed 's/^/📄 /' || true

          echo ""
          echo "------------------------------"
          echo "⚠️  Unfixable Violations"
          echo "------------------------------"

          # Show detailed unfixable violations
          if grep -q "L:" lint_output.txt; then
            grep -E "L:[0-9]+ *|L[0-9]+" lint_output.txt | sed 's/^/❌ /'
            echo "has_unfixable=true" >> $GITHUB_ENV
          else
            echo "🎉 No unfixable violations found!"
            echo "has_unfixable=false" >> $GITHUB_ENV
          fi

      - name: Commit and push fixes
        if: env.has_unfixable == 'false'
        run: |
          if [[ `git status --porcelain` ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "🤖 SQLFluff auto-fixes"
            git push
          else
            echo "No fixes to commit."
          fi

      - name: Fail if unfixable violations exist
        if: env.has_unfixable == 'true'
        run: |
          echo "❌ Unfixable SQLFluff violations could not be auto-fixed."
          echo "Please review the issues listed above and fix manually."
          exit 1