name: Lint and Auto-Fix dbt Project

on:
  push:
    branches-ignore:
      - 'main'

permissions:
  contents: write

jobs:
  lint_and_fix_project:
    name: Run SQLFluff Linter and Auto-Fix
    runs-on: ubuntu-latest

    env:
      DBT_STAGE: STAGE
      DBT_ANALYTICS: ANALYTICS

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Required for committing back changes

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install SQLFluff
        run: |
          python -m pip install --upgrade pip
          pip install "sqlfluff==3.1.0"
          pip install sqlfluff-templater-dbt
          pip install dbt-snowflake

      - name: Install dbt packages
        run: |
          dbt deps || echo "Skipping dbt deps if no packages.yml found!"

      - name: Validate SQLFluff configuration
        run: |
          echo "Using SQLFluff version:"
          sqlfluff --version

      - name: Auto-fix SQLFluff issues
        run: |
          sqlfluff fix models --dialect snowflake --templater dbt
        continue-on-error: true  # Prevents workflow from failing even if no fixes are possible

      - name: Run SQLFluff lint
        run: |
          sqlfluff lint models --dialect snowflake --templater dbt

      - name: Commit and push fixes (if any)
        run: |
          if [[ `git status --porcelain` ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "🤖 SQLFluff auto-fixes"
            git push
          else
            echo "No fixes to commit."
          fi