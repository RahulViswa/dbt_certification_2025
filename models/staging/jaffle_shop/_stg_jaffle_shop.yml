version: 2

models:
  - name: stg_jaffle_shop__customers
    description: The grain of this table is one unique customer per row.
    columns:
      - name: customer_id
        description: The primary key for the customer's table.
        data_tests:
          - unique
          - not_null

  - name: stg_jaffle_shop__orders
    description: The grain of this table is one order per row.
    columns:
      - name: order_id
        description: The primary key for the order's table.
        data_tests:
          - unique
          - not_null
      - name: order_status
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - completed
                  - shipped
                  - returned
                  - placed
                  - return_pending
      - name: customer_id
        data_tests:
          - relationships:
              arguments:
                field: customer_id
                to: ref('stg_jaffle_shop__customers')