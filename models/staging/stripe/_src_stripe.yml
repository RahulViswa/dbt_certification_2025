version: 2

sources:
  - name: stripe
    database: raw
    schema: stripe
    description: A clone of a Postgres application database.
    tables:
      - name: payment
        description: Raw payments data.
        config:
          freshness:
            error_after:
              count: 365
              period: day
            warn_after:
              count: 24
              period: hour
          loaded_at_field: _batched_at
        columns:
          - name: id
            description: primary key for the payments data.
            tests:
              - unique
              - not_null